name: Build WinUI SonyHeadphonesClient

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore and Build Solution
      run: |
        msbuild SonyHeadphonesClient/SonyHeadphonesClient.sln /t:Restore;Build /p:Configuration=Release /p:Platform=x64

    - name: Upload Compiled Executable
      uses: actions/upload-artifact@v4
      with:
        name: WinUI-SonyHeadphonesClient-x64
        path: "**/bin/x64/Release/**"
