name: Build WinUI SonyHeadphonesClient

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Install Dependencies
      run: dotnet add package H.NotifyIcon.WinUI

    - name: Build Solution
      run: dotnet build --configuration Release /p:Platform=x64

    - name: Upload Compiled Executable
      uses: actions/upload-artifact@v4
      with:
        name: WinUI-SonyHeadphonesClient-x64
        path: "**/bin/x64/Release/**"
